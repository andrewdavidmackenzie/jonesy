name: 'Jonesy Panic Analysis'
description: 'Analyze Rust binaries for panic points and annotate PRs'
author: 'Andrew Mackenzie'

branding:
  icon: 'alert-triangle'
  color: 'orange'

inputs:
  fail-on-panic:
    description: 'Fail the workflow if panic points are found'
    required: false
    default: 'false'
  working-directory:
    description: 'Directory to run analysis in (defaults to repository root)'
    required: false
    default: '.'
  binary:
    description: 'Specific binary to analyze (defaults to auto-detect)'
    required: false
    default: ''
  extra-args:
    description: 'Additional arguments to pass to jonesy'
    required: false
    default: ''
  comment-on-pr:
    description: 'Post a summary comment on pull requests'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Install jonesy
      shell: bash
      run: |
        # Try cargo-binstall for faster installation (pre-built binary)
        # Fall back to cargo install if binstall fails
        if command -v cargo-binstall &> /dev/null || cargo install cargo-binstall 2>/dev/null; then
          echo "Using cargo-binstall for faster installation..."
          if cargo binstall jonesy --no-confirm --log-level info 2>&1; then
            echo "::notice::Installed jonesy via cargo-binstall (pre-built binary)"
            exit 0
          fi
          echo "::warning::cargo-binstall failed, falling back to cargo install"
        fi

        # Fallback: build from source
        echo "Installing jonesy from source..."
        cargo install jonesy
        echo "::notice::Installed jonesy via cargo install (built from source)"

    - name: Register problem matcher
      shell: bash
      run: echo "::add-matcher::${{ github.action_path }}/.github/problem-matcher.json"

    - name: Run jonesy analysis
      id: jonesy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set +e
        # Capture output to parse panic count (exit codes are limited to 0-255)
        if [ -n "${{ inputs.binary }}" ]; then
          output=$(jonesy --no-hyperlinks ${{ inputs.extra-args }} "${{ inputs.binary }}" 2>&1)
        else
          output=$(jonesy --no-hyperlinks ${{ inputs.extra-args }} 2>&1)
        fi
        exit_code=$?
        echo "$output"

        # Also capture JSON output for PR comment
        # Note: jonesy exits non-zero when panics are found, so we ignore the exit code
        if [ -n "${{ inputs.binary }}" ]; then
          json_output=$(jonesy --format json ${{ inputs.extra-args }} "${{ inputs.binary }}" 2>/dev/null) || true
        else
          json_output=$(jonesy --format json ${{ inputs.extra-args }} 2>/dev/null) || true
        fi
        # Save JSON to file for next step (use empty object if no output)
        if [ -n "$json_output" ]; then
          echo "$json_output" > /tmp/jonesy-output.json
        else
          echo '{}' > /tmp/jonesy-output.json
        fi

        # Parse panic count from output: "Panic points: X in Y file(s)"
        # This handles counts > 255 which would wrap in exit codes
        panic_count=$(echo "$output" | grep -oE "Panic points: [0-9]+" | grep -oE "[0-9]+" | tail -1)
        if [ -z "$panic_count" ]; then
          panic_count=$exit_code  # Fallback to exit code if parsing fails
        fi
        echo "panic-count=$panic_count" >> $GITHUB_OUTPUT

        # Show summary in job output
        if [ "$panic_count" -eq 0 ] 2>/dev/null; then
          echo "::notice::✅ No panic points found"
        else
          echo "::warning::Found $panic_count panic point(s). See annotations above for details."
        fi

        if [ "${{ inputs.fail-on-panic }}" = "true" ] && [ "$panic_count" -gt 0 ] 2>/dev/null; then
          echo "::error::Build failed: Found $panic_count panic point(s)"
          exit 1
        fi
        exit 0

    - name: Post PR comment
      if: github.event_name == 'pull_request' && inputs.comment-on-pr == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Generate markdown comment from JSON output
        json_file="/tmp/jonesy-output.json"
        if [ ! -f "$json_file" ] || [ ! -s "$json_file" ]; then
          echo "No JSON output found, skipping PR comment"
          exit 0
        fi

        # Parse JSON and generate markdown
        # Handle both single-project (.panic_points) and workspace (.workspace.members[].panic_points) formats
        panic_count=$(jq -r '.summary.panic_points // .summary.total_panic_points // 0' "$json_file")
        file_count=$(jq -r '.summary.files_affected // .summary.total_files_affected // 0' "$json_file")
        version=$(jq -r '.jonesy_version // "unknown"' "$json_file")

        # Build comment body
        comment="<!-- jonesy-analysis-comment -->\n"
        comment+="## 🔍 Jonesy Panic Analysis\n\n"

        if [ "$panic_count" -eq 0 ]; then
          comment+="✅ **No panic points found!**\n"
        else
          comment+="Found **$panic_count panic point(s)** in **$file_count file(s)**\n\n"

          # Extract panic points - handle both formats
          # Single project: .panic_points[]
          # Workspace: .workspace.members[].panic_points[]
          jq -r '
            if .panic_points then .panic_points[]
            elif .workspace then .workspace.members[].panic_points[]
            else empty end
            | {file: .file, line: .line, column: (.column // 1), cause: (.causes[0].description // "unknown"), code: (.causes[0].code // "-"), docs_url: (.causes[0].docs_url // "")}
          ' "$json_file" 2>/dev/null > /tmp/panic_points.json

          # Get repo info for source links
          repo="${{ github.repository }}"
          sha="${{ github.event.pull_request.head.sha }}"

          # Group by file and generate sections
          files=$(jq -rs '[.[].file] | unique | .[]' /tmp/panic_points.json 2>/dev/null)
          for file in $files; do
            # Make path relative for display and links
            display_file=$(echo "$file" | sed 's|.*/\(src/.*\)|\1|' | sed 's|^/[^/]*/[^/]*/[^/]*/[^/]*/||')
            count=$(jq -rs --arg f "$file" '[.[] | select(.file == $f)] | length' /tmp/panic_points.json)
            comment+="<details>\n"
            comment+="<summary><code>$display_file</code> ($count panic points)</summary>\n\n"
            comment+="| Line | Cause | Code |\n"
            comment+="|------|-------|------|\n"

            # Get panic points for this file (limit to 50) with links
            rows=$(jq -rs --arg f "$file" --arg repo "$repo" --arg sha "$sha" --arg display "$display_file" '
              [.[] | select(.file == $f)][:50]
              | .[]
              | "| [\(.line):\(.column)](https://github.com/\($repo)/blob/\($sha)/\($display)#L\(.line)) | \(.cause) | \(if .docs_url != "" then "[\(.code)](\(.docs_url))" else .code end) |"
            ' /tmp/panic_points.json 2>/dev/null)
            comment+="$rows\n"
            comment+="\n</details>\n\n"
          done
          rm -f /tmp/panic_points.json
        fi

        comment+="\n---\n"
        comment+="<sub>Generated by [jonesy](https://github.com/andrewdavidmackenzie/jonesy) v$version</sub>"

        # Find existing comment to update (best-effort, may fail on forks)
        pr_number="${{ github.event.pull_request.number }}"
        if ! existing_comment=$(gh api "repos/${{ github.repository }}/issues/${pr_number}/comments" \
          --jq '.[] | select(.body | contains("<!-- jonesy-analysis-comment -->")) | .id' 2>/dev/null | head -1); then
          echo "::warning::Cannot access PR comments (forked PR or insufficient permissions)"
          exit 0
        fi

        # Post or update comment (best-effort)
        if [ -n "$existing_comment" ]; then
          echo "Updating existing comment $existing_comment"
          if ! echo -e "$comment" | gh api "repos/${{ github.repository }}/issues/comments/${existing_comment}" \
            -X PATCH -F body=@- >/dev/null 2>&1; then
            echo "::warning::Failed to update PR comment (insufficient permissions)"
          fi
        else
          echo "Creating new comment"
          if ! echo -e "$comment" | gh api "repos/${{ github.repository }}/issues/${pr_number}/comments" \
            -F body=@- >/dev/null 2>&1; then
            echo "::warning::Failed to create PR comment (insufficient permissions)"
          fi
        fi

outputs:
  panic-count:
    description: 'Number of panic points found'
    value: ${{ steps.jonesy.outputs.panic-count }}
